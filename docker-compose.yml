# ─────────────────────────────────────────────────────────────
# docker-compose.yml  –  Multi-container monorepo deployment
#
# Services:
#   backend      – Express.js API (port 5001)
#   admin        – Next.js Admin Dashboard (port 3000)
#   storefront   – Next.js Storefront with SSG/ISR (port 3001)
#   nginx        – Reverse-proxy / media server (port 80/443)
#
# Shared volume "uploads" ensures files saved by the admin are
# immediately available to the storefront and the Nginx media
# server without any cloud storage dependency.
# ─────────────────────────────────────────────────────────────

version: "3.9"

volumes:
  uploads:
    driver: local

services:
  # ── Backend API ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - PORT=5001
      - SHARED_UPLOADS_DIR=/var/www/uploads
      - ADMIN_URL=http://admin:3000
      - STOREFRONT_URL=http://storefront:3001
    volumes:
      - uploads:/var/www/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Admin Dashboard ───────────────────────────────────────
  admin:
    build:
      context: .
      dockerfile: admin-next/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ./admin-next/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://backend:5001
    volumes:
      - uploads:/var/www/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Storefront ────────────────────────────────────────────
  storefront:
    build:
      context: .
      dockerfile: apps/storefront/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./apps/storefront/.env.local
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=http://backend:5001
    volumes:
      - uploads:/var/www/uploads:ro
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # ── Nginx – Reverse proxy & media server ──────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - uploads:/var/www/uploads:ro
    depends_on:
      - backend
      - admin
      - storefront
    restart: unless-stopped
