# ─────────────────────────────────────────────────────────────
# Nginx configuration – Production reverse proxy with SSL
#
# Routing:
#   admin.<domain>  → Admin Dashboard  (port 3000)
#   store.<domain>  → Storefront       (port 3001)
#   api.<domain>    → Backend API      (port 5001)
#   assets.<domain> → Static uploads   (served directly by Nginx)
#   *.<domain>      → Storefront       (tenant subdomains)
#
# SSL certificates are managed by Certbot (Let's Encrypt) on the
# host and mapped into the container via bind mounts.
# ─────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # ── Upstreams ────────────────────────────────────────────
    upstream backend_api {
        server backend:5001;
    }

    upstream admin_app {
        server admin:3000;
    }

    upstream storefront_app {
        server storefront:3001;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Allow ACME challenge for Certbot
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── API Server (HTTPS) ───────────────────────────────────
    server {
        listen 443 ssl;
        server_name api.YOURDOMAIN.com;

        ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }
    }

    # ── Admin Dashboard (HTTPS) ──────────────────────────────
    server {
        listen 443 ssl;
        server_name admin.YOURDOMAIN.com;

        ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://admin_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Assets / Media Server (HTTPS) ────────────────────────
    server {
        listen 443 ssl;
        server_name assets.YOURDOMAIN.com;

        ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        root /var/www/uploads;

        location / {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }
    }

    # ── Storefront + tenant subdomains (HTTPS) ───────────────
    # This catch-all must be LAST. It handles:
    #   store.YOURDOMAIN.com  (main storefront)
    #   tenant1.YOURDOMAIN.com (tenant-specific storefront)
    server {
        listen 443 ssl default_server;
        server_name *.YOURDOMAIN.com;

        ssl_certificate     /etc/letsencrypt/live/YOURDOMAIN.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOURDOMAIN.com/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://storefront_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
