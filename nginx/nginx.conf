# ─────────────────────────────────────────────────────────────
# Nginx configuration – Reverse proxy for the monorepo apps
#
# Routing:
#   admin.<domain>  → Admin Dashboard  (port 3000)
#   store.<domain>  → Storefront       (port 3001)
#   api.<domain>    → Backend API      (port 5001)
#   assets.<domain> → Static uploads   (served directly by Nginx)
#
# This file is mounted read-only into the Nginx container via
# docker-compose.yml.
# ─────────────────────────────────────────────────────────────

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstreams ────────────────────────────────────────────
    upstream backend_api {
        server backend:5001;
    }

    upstream admin_app {
        server admin:3000;
    }

    upstream storefront_app {
        server storefront:3001;
    }

    # ── API Server ───────────────────────────────────────────
    server {
        listen 80;
        server_name api.localhost api.*;

        location / {
            proxy_pass http://backend_api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Admin Dashboard ──────────────────────────────────────
    server {
        listen 80;
        server_name admin.localhost admin.*;

        location / {
            proxy_pass http://admin_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Storefront ───────────────────────────────────────────
    server {
        listen 80;
        server_name store.localhost store.* *.localhost;

        location / {
            proxy_pass http://storefront_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ── Assets / Media Server ────────────────────────────────
    # Serves uploaded files directly from the shared Docker volume.
    # URL pattern: https://assets.<domain>/product-1.jpg
    server {
        listen 80;
        server_name assets.localhost assets.*;

        root /var/www/uploads;

        location / {
            # Cache static assets aggressively
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            try_files $uri =404;
        }
    }
}
